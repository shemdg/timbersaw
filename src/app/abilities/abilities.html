<section class="w-full bg-gradient-to-b from-[#0c0f12] to-[#181c22] border-b-4 border-[#2c231e] py-16 px-4 text-gray-200">
  <div class="max-w-6xl mx-auto">
    
    <h2 class="text-center text-3xl font-black tracking-widest text-[#e5dfdb] mb-8 drop-shadow-[0_0_10px_rgba(230,74,25,0.3)]">
      ABILITIES
    </h2>

    <!-- Icon Row: Added 'flex-wrap' for mobile responsiveness -->
    <div class="flex justify-center mb-12">
      <div class="flex flex-wrap items-center gap-4 bg-black/40 p-4 rounded-lg border border-[#323a44] shadow-inner">
        @for (ability of abilities; track ability.id) {
          <img 
            [src]="ability.iconUrl" 
            [alt]="ability.name"
            (click)="selectAbility(ability)"
            class="w-20 h-20 object-cover rounded border-2 cursor-pointer transition-all duration-300
                   hover:grayscale-0 hover:opacity-100 hover:-translate-y-1 hover:border-[#b04924] hover:shadow-[0_8px_20px_rgba(176,73,36,0.4)]"
            [ngClass]="selectedAbility.id === ability.id 
              ? 'grayscale-0 opacity-100 border-[#ff5722] scale-105 shadow-[0_0_15px_rgba(255,87,34,0.6)]' 
              : 'grayscale opacity-70 border-[#232931]'"
          >
        }
      </div>
    </div>

    <!-- Showcase Area -->
    <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-center mt-4">
      
      <!-- Fixed: Changed border-3 to border-4 -->
      <div class="col-span-12 md:col-span-7">
        <video 
          [src]="selectedAbility.videoUrl" 
          autoplay 
          loop 
          muted 
          playsinline
          class="w-full block rounded border-4 border-[#232931] shadow-[0_10px_30px_rgba(0,0,0,0.7)] bg-black">
        </video>
      </div>

      <div class="col-span-12 md:col-span-5 px-2">
        <h3 class="text-3xl font-extrabold text-white mb-3 tracking-wide drop-shadow-md">
          {{ selectedAbility.name }}
        </h3>
        <p class="text-lg text-[#b0b8c3] leading-relaxed font-light">
          {{ selectedAbility.description }}
        </p>
      </div>
    </div>
  </div>
</section>
