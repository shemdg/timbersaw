<div class="banner">
    <div class="hero-card">
        <div class="card-header">
            <img src="/assets/images/Timbersaw_icon.webp" alt="Timbersaw" class="hero-portrait">
            
            <div class="attributes-row">
                <div class="attr-badge strength">
                    <img src="/assets/images/Strength_attribute_symbol.webp" alt="STR">
                    <span class="attr-gain">25 + 3.5</span>
                </div>
                <div class="attr-badge agility">
                    <img src="/assets/images/Agility_attribute_symbol.webp" alt="AGI">
                    <span class="attr-gain">16 + 1.6</span>
                </div>
                <div class="attr-badge intelligence">
                    <img src="/assets/images/Intelligence_attribute_symbol.webp" alt="INT">
                    <span class="attr-gain">23 + 2.7</span>
                </div>
            </div>
        </div>
        
        <div class="card-body">
            <h2 class="hero-name">TIMBERSAW</h2>
            <p class="hero-roles">MELEE • DURABLE • NUKER • ESCAPE</p>
        </div>

        <div class="vitals-container">
            <div class="stat-bar health-bar">
                <span class="bar-text">750 / 750</span>
                <span class="bar-regen">+4.2</span>
            </div>
            <div class="stat-bar mana-bar">
                <span class="bar-text">351 / 351</span>
                <span class="bar-regen">+1.9</span>
            </div>
        </div>

        <button class="card-action-btn">
            <span>VIEW ABILITIES</span>
        </button>
    </div>
</div>
